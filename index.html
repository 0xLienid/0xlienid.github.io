<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body class="page">
    <div class="header">
      <a href="/">
        <h1>Matt Firth</h1>
      </a>
    </div>

    <div class="content">
      <h3>Articles</h3>
      <ul id="article-list" class="article-list"></ul>
    </div>

    <script>
      fetch('articles.json')
        .then(r => r.json())
        .then(articles => {
          const list = document.getElementById('article-list');
          articles.forEach(a => {
            const li = document.createElement('li');
            li.innerHTML = `<a href="articles/${a.slug}/">${a.title}</a><span class="date">${a.date}</span>${a.summary ? `<p class="summary">${a.summary}</p>` : ''}`;
            list.appendChild(li);
          });
        });
    </script>
  </body>
</html>
